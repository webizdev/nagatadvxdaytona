services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: www-data
        uid: 1000
    image: nagata-daytona-app
    container_name: nagata-daytona-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - app-network

  # Queue Worker Service
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: www-data
        uid: 1000
    image: nagata-daytona-app
    container_name: nagata-daytona-worker
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=300
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - app-network
    depends_on:
      - db
      - app

  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: nagata-daytona-web
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: nagata-daytona-db
    restart: unless-stopped
    tty: true
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: nagatadv_xdaytona
      MYSQL_ROOT_PASSWORD: WwT4pVVhjS2DCpSyprgD
      MYSQL_PASSWORD: WwT4pVVhjS2DCpSyprgD
      MYSQL_USER: nagatadv_xdaytona
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nagata-daytona-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
